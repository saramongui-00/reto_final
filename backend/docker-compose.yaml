services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181
    networks:
      - optica-network
  
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - optica-network

  mysql-db:
    image: mysql:8.0.45
    container_name: mysql-optica
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: optica
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - optica-network

  mongodb:
    image: mongo:7.0
    container_name: optica-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: optica_historial
    volumes:
      - mongo_data:/data/db
    networks:
      - optica-network

  redis:
    image: redis:7.2-alpine
    container_name: optica-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - optica-network

volumes:
  mysql_data:
  mongo_data:
  redis_data:

networks:
  optica-network:
    driver: bridge