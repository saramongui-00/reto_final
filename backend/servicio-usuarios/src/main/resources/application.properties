# Configuración del Servidor
server.port=8082
spring.application.name=servicio-usuarios

# Configuración de MySQL apuntando a la BD unificada 'optica'
spring.datasource.url=jdbc:mysql://localhost:3306/optica?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

##spring.security.oauth2.resourceserver.jwt.secret-key=EstaEsUnaClaveSecretaUltraSeguraParaLaOptica2026!!!
app.jwt.secret=EstaEsUnaClaveSecretaUltraSeguraParaLaOptica2026!!!
# CONFIGURACIÓN DE KAFKA 
spring.kafka.bootstrap-servers=localhost:9092

# Configuración del Consumidor (Listener)
spring.kafka.consumer.group-id=usuarios-group
spring.kafka.consumer.auto-offset-reset=earliest

# Deserializadores
# Cambiar el serializador de valores de String a JSON
## spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.properties.spring.json.type.mapping=usuario_creado:edu.uptc.swii.servicio_usuarios.domain.events.UsuarioCreatedEvent
# Borra o comenta estas líneas si existen para evitar conflictos:
# spring.kafka.producer.value-serializer=...
# spring.kafka.producer.properties.spring.json.objectmapper=...